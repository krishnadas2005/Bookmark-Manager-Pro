<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bookmark Manager Pro</title>

<link rel="icon" type="image/png" href="icon.png">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<h1 class="logo">🔖 Bookmark Manager Pro</h1>

<div class="controls">

<input id="search" placeholder="Search bookmarks">

<button onclick="toggleDark()">🌙</button>

<button onclick="exportBookmarks()">Export</button>

<input type="file" id="importFile">

</div>

</header>


<main>

<section class="addForm">

<input id="name" placeholder="Website name">

<input id="url" placeholder="https://example.com">

<button onclick="addBookmark()">Add Bookmark</button>

</section>


<section id="bookmarkGrid"></section>

</main>


<script src="script.js"></script>

</body>
</html>
